set_schedule:
  name: Set schedule
  description: >-
    Write an on-device schedule block for one or more zones (DP 38). One
    write per call - calling again for the same zone replaces its block.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: iic400
    zones:
      name: Zones
      description: "Zone number(s), e.g. \"2\" or \"1,3\" or \"all\"."
      required: true
      example: "1"
      selector:
        text:
    duration_minutes:
      name: Duration (minutes)
      required: true
      example: 10
      selector:
        number:
          min: 1
          max: 99
          mode: box
    start_times:
      name: Start times
      description: "Up to 6 comma-separated HH:MM start times."
      required: true
      example: "06:30"
      selector:
        text:
    cycle_type:
      name: Cycle
      description: "all | days:all | days:mon,wed,fri (or full names: days:Monday,Wednesday,Friday) | odd | even | interval:N[:YYYY-MM-DD]"
      default: "all"
      selector:
        text:
    rain_obey:
      name: Obey rain sensor
      default: true
      selector:
        boolean:

clear_schedule:
  name: Clear schedule
  description: Disable the on-device schedule for the given zone(s).
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: iic400
    zones:
      name: Zones
      description: "Zone number(s), e.g. \"2\" or \"1,3\" or \"all\"."
      required: true
      example: "1"
      selector:
        text:

quick_water:
  name: Quick water
  description: >-
    Fixed-duration, self-timed run for one zone - the device stops itself,
    no explicit stop needed. Does not affect the zone switches' state.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: iic400
    zone:
      name: Zone
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box
    duration_minutes:
      name: Duration (minutes)
      required: true
      example: 10
      selector:
        number:
          min: 1
          max: 99
          mode: box
