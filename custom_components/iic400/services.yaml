quick_water:
  name: Quick water
  description: >-
    Fixed-duration, self-timed run for one zone - the device stops itself,
    no explicit stop needed. Does not affect the zone switches' state.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: iic400
    zone:
      name: Zone
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box
    duration_minutes:
      name: Duration (minutes)
      required: true
      example: 10
      selector:
        number:
          min: 1
          max: 99
          mode: box
