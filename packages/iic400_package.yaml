# ============================================================
# Home Assistant package: Inkbird IIC-400-WIFI
# Place in /config/packages/iic400.yaml
# (requires in configuration.yaml:
#    homeassistant:
#      packages: !include_dir_named packages )
#
# Prerequisites:
#   - /config/scripts/iic400.py (version with JSON cache)
#   - tinytuya: python3 -m pip install tinytuya --target /config/scripts/lib
#   - tuya-local profile inkbird_iic400_wifi.yaml (with the
#     "Zones running raw" sensor)
#
# Zone state source (raw bitmask z1=1 z2=2 z3=4 z4=8):
#   sensor.inkbird_iic_400_irrigation_controller_zones_running_raw
#
# i18n note: HA has no official translation mechanism for user-defined
# YAML entities. Names below are English; rename any entity to your
# language from the HA UI (pencil icon) - per-instance and durable.
# ============================================================

shell_command:
  iic400_start_zone: "python3 /config/scripts/iic400.py start {{ zone }} {{ minutes }}"
  iic400_multi: "python3 /config/scripts/iic400.py multi {{ z1 }} {{ z2 }} {{ z3 }} {{ z4 }}"
  iic400_stop: "python3 /config/scripts/iic400.py stop"
  iic400_schedule: >-
    python3 /config/scripts/iic400.py schedule '{{ zones }}' {{ minutes }}
    '{{ times }}' '{{ mode }}' '{{ rain }}'
  iic400_schedule_off: "python3 /config/scripts/iic400.py schedule '{{ zones }}' off"
  iic400_read_schedules: "python3 /config/scripts/iic400.py schedules"

# ---------- Scripts (for automations and the Stop button) ----------
script:
  water_zone:
    alias: "Water a zone"
    icon: mdi:sprinkler
    fields:
      zone:
        description: "Zone number (1-4)"
        example: 1
      minutes:
        description: "Duration in minutes"
        example: 10
    sequence:
      - service: shell_command.iic400_start_zone
        data:
          zone: "{{ zone }}"
          minutes: "{{ minutes }}"

  stop_watering:
    alias: "Stop watering"
    icon: mdi:water-off
    sequence:
      - service: shell_command.iic400_stop

  # ---------- Schedule management from the dashboard ----------
  iic400_apply_schedule:
    alias: "IIC400 - Apply schedule"
    icon: mdi:calendar-check
    sequence:
      - service: shell_command.iic400_schedule
        data:
          zones: "{{ states('input_text.iic400_zones') }}"
          minutes: "{{ states('input_number.iic400_minutes') | int }}"
          times: "{{ states('input_text.iic400_times') }}"
          mode: "{{ states('input_text.iic400_mode') }}"
          rain: "{{ states('input_select.iic400_rain') }}"
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.iic400_schedules

  iic400_clear_schedule:
    alias: "IIC400 - Clear schedule (entered zones)"
    icon: mdi:calendar-remove
    sequence:
      - service: shell_command.iic400_schedule_off
        data:
          zones: "{{ states('input_text.iic400_zones') }}"
      - service: homeassistant.update_entity
        target:
          entity_id: sensor.iic400_schedules

  iic400_refresh_schedules:
    alias: "IIC400 - Re-read schedules from device"
    icon: mdi:refresh
    sequence:
      - service: shell_command.iic400_read_schedules

# ---------- Form helpers ----------
input_text:
  iic400_zones:
    name: "Schedule - zones (e.g. 2 or 1,3 or all)"
    initial: "1"
    icon: mdi:numeric
  iic400_times:
    name: "Schedule - start times (e.g. 06:30 or 06:00,19:30)"
    initial: "06:30"
    icon: mdi:clock-outline
  iic400_mode:
    name: "Schedule - mode (all | mon,wed,fri | odd | even | interval:2)"
    initial: "all"
    icon: mdi:calendar

input_number:
  iic400_manual_minutes:
    name: "Manual watering duration (minutes)"
    min: 1
    max: 99
    step: 1
    initial: 10
    icon: mdi:timer
  iic400_minutes:
    name: "Schedule - duration (minutes)"
    min: 1
    max: 99
    step: 1
    initial: 10
    icon: mdi:timer

input_select:
  iic400_rain:
    name: "Schedule - rain sensor"
    options: ["obey", "ignore"]
    initial: "obey"
    icon: mdi:weather-rainy

# ---------- Schedule cache reader (no device connection) ----------
command_line:
  - sensor:
      name: "IIC400 schedules"
      unique_id: iic400_schedules_cache
      command: "cat /config/scripts/iic400_schedules.json 2>/dev/null || echo '{}'"
      value_template: >-
        {{ value_json | count if value_json else 0 }}
      json_attributes:
        - "1"
        - "2"
        - "3"
        - "4"
      scan_interval: 60

# ---------- Zone switches + per-zone schedule text ----------
# Template switches (modern syntax): state = the zone is ACTUALLY
# watering (device-reported via DP 107 bitmask z1=1 z2=2 z3=4 z4=8).
# Turn on = start the zone for input_number.iic400_manual_minutes.
# Turn off = stop manual watering (DP 45 stop ends the whole run).
template:
  # Debounce filter: ignores transient/stale DP107 values that appear
  # for a few seconds when tuya-local reconnects after our commands.
  - binary_sensor:
      - name: "Zone 1 running filtered"
        unique_id: iic400_zone_1_running_filtered
        delay_on: "00:00:04"
        delay_off: "00:00:02"
        state: >-
          {{ states('sensor.inkbird_iic_400_irrigation_controller_zones_running_raw')
             | int(0) | bitwise_and(1) > 0 }}
      - name: "Zone 2 running filtered"
        unique_id: iic400_zone_2_running_filtered
        delay_on: "00:00:04"
        delay_off: "00:00:02"
        state: >-
          {{ states('sensor.inkbird_iic_400_irrigation_controller_zones_running_raw')
             | int(0) | bitwise_and(2) > 0 }}
      - name: "Zone 3 running filtered"
        unique_id: iic400_zone_3_running_filtered
        delay_on: "00:00:04"
        delay_off: "00:00:02"
        state: >-
          {{ states('sensor.inkbird_iic_400_irrigation_controller_zones_running_raw')
             | int(0) | bitwise_and(4) > 0 }}
      - name: "Zone 4 running filtered"
        unique_id: iic400_zone_4_running_filtered
        delay_on: "00:00:04"
        delay_off: "00:00:02"
        state: >-
          {{ states('sensor.inkbird_iic_400_irrigation_controller_zones_running_raw')
             | int(0) | bitwise_and(8) > 0 }}
  - switch:
      - name: "Zone 1"
        unique_id: iic400_zone_1_valve
        icon: mdi:sprinkler
        state: "{{ is_state('binary_sensor.zone_1_running_filtered', 'on') }}"
        turn_on:
          - service: shell_command.iic400_start_zone
            data:
              zone: 1
              minutes: "{{ states('input_number.iic400_manual_minutes') | int }}"
        turn_off:
          - service: shell_command.iic400_stop
      - name: "Zone 2"
        unique_id: iic400_zone_2_valve
        icon: mdi:sprinkler
        state: "{{ is_state('binary_sensor.zone_2_running_filtered', 'on') }}"
        turn_on:
          - service: shell_command.iic400_start_zone
            data:
              zone: 2
              minutes: "{{ states('input_number.iic400_manual_minutes') | int }}"
        turn_off:
          - service: shell_command.iic400_stop
      - name: "Zone 3"
        unique_id: iic400_zone_3_valve
        icon: mdi:sprinkler
        state: "{{ is_state('binary_sensor.zone_3_running_filtered', 'on') }}"
        turn_on:
          - service: shell_command.iic400_start_zone
            data:
              zone: 3
              minutes: "{{ states('input_number.iic400_manual_minutes') | int }}"
        turn_off:
          - service: shell_command.iic400_stop
      - name: "Zone 4"
        unique_id: iic400_zone_4_valve
        icon: mdi:sprinkler
        state: "{{ is_state('binary_sensor.zone_4_running_filtered', 'on') }}"
        turn_on:
          - service: shell_command.iic400_start_zone
            data:
              zone: 4
              minutes: "{{ states('input_number.iic400_manual_minutes') | int }}"
        turn_off:
          - service: shell_command.iic400_stop

  - sensor:
      - name: "Zone 1 schedule"
        icon: mdi:calendar-clock
        state: >-
          {{ (state_attr('sensor.iic400_schedules', '1') or {}).get('summary',
             'unknown') }}
      - name: "Zone 2 schedule"
        icon: mdi:calendar-clock
        state: >-
          {{ (state_attr('sensor.iic400_schedules', '2') or {}).get('summary',
             'unknown') }}
      - name: "Zone 3 schedule"
        icon: mdi:calendar-clock
        state: >-
          {{ (state_attr('sensor.iic400_schedules', '3') or {}).get('summary',
             'unknown') }}
      - name: "Zone 4 schedule"
        icon: mdi:calendar-clock
        state: >-
          {{ (state_attr('sensor.iic400_schedules', '4') or {}).get('summary',
             'unknown') }}